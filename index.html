<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu sesión NeuroSync · Método Holístico</title>
<meta name="description" content="Responde estas preguntas y construimos una sesión NeuroSync hecha para ti.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --noche:#faf9f6;        /* fondo crema-blanco de la landing */
    --noche-2:#ffffff;      /* superficie de campos */
    --tinta:#0e1822;        /* tinta oscura */
    --crema:#0e1822;        /* texto principal (alias, JS-safe) */
    --humo:#6b7580;         /* texto secundario */
    --azul:#2d5a8f;         /* primario navy */
    --brasa:#b8871f;        /* acento dorado */
    --brasa-honda:#96690f;  /* dorado hondo */
    --linea:rgba(14,24,34,.12);
    --radius:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  html,body{overflow-x:hidden}
  body{
    background:var(--noche);
    color:var(--tinta);
    font-family:'DM Sans',system-ui,sans-serif;
    font-size:17px;line-height:1.6;
    min-height:100svh;
    display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  /* ── halo ambiental navy: crece conforme avanzas ── */
  .fuego{
    position:fixed;inset:auto 0 0 0;height:42vh;pointer-events:none;z-index:0;
    background:radial-gradient(120% 100% at 50% 115%, rgba(45,90,143,var(--calor,0.10)) 0%, rgba(184,135,31,calc(var(--calor,0.10)*0.30)) 40%, transparent 72%);
    transition:opacity 1.2s ease;
  }
  /* ── progreso: línea dorada ── */
  .progreso{
    position:fixed;top:0;left:0;right:0;height:3px;z-index:10;background:rgba(14,24,34,.08);
  }
  .progreso b{
    display:block;height:100%;width:0%;
    background:linear-gradient(90deg,var(--azul),var(--brasa));
    box-shadow:0 0 10px rgba(184,135,31,.45);
    transition:width .5s cubic-bezier(.2,.8,.2,1);
  }
  header{
    position:relative;z-index:2;
    display:flex;justify-content:space-between;align-items:center;gap:14px;
    padding:18px clamp(18px,5vw,48px);
    border-bottom:1px solid var(--linea);
  }
  .marca{
    display:flex;align-items:center;gap:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--humo);
  }
  .marca svg{flex:0 0 22px}
  .marca strong{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;letter-spacing:.01em;color:var(--tinta);text-transform:none}
  .contador{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--azul);flex:0 0 auto;
  }
  main{
    position:relative;z-index:2;flex:1;
    display:flex;align-items:flex-start;justify-content:center;text-align:left;
    padding:min(7vh,60px) clamp(18px,5vw,48px) 96px;
  }
  .paso{width:min(660px,100%);margin:0 auto;text-align:left;min-height:52vh;animation:entra .5s ease both}
  @keyframes entra{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .paso{animation:none}
    .progreso b,.fuego{transition:none}
  }
  .eyebrow{display:block;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--brasa);margin-bottom:18px;
  }
  h1,h2{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(1.85rem,5.2vw,2.7rem);line-height:1.1;
    letter-spacing:-.01em;margin-bottom:16px;
  }
  .sub{color:var(--humo);font-size:1rem;margin-bottom:30px;max-width:52ch}
  .sub em{color:var(--azul);font-style:italic}
  textarea,input[type=text],input[type=email],input[type=tel]{
    width:100%;background:var(--noche-2);color:var(--tinta);
    border:1px solid var(--linea);border-radius:var(--radius);
    padding:16px 18px;font:inherit;resize:vertical;
    transition:border-color .2s, box-shadow .2s;
  }
  textarea{min-height:132px}
  textarea:focus,input:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(45,90,143,.12)}
  :focus-visible{outline:2px solid var(--azul);outline-offset:2px}
  ::placeholder{color:rgba(107,117,128,.65)}
  .campo{margin-bottom:16px}
  .campo label{display:block;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--humo);margin-bottom:8px}
  .opciones{display:grid;gap:12px}
  .opcion{
    display:flex;align-items:center;gap:14px;
    background:var(--noche-2);border:1px solid var(--linea);border-radius:var(--radius);
    padding:16px 18px;cursor:pointer;transition:border-color .15s, background .15s;
    font-size:1.02rem;
  }
  .opcion:hover{border-color:rgba(45,90,143,.5)}
  .opcion input{position:absolute;opacity:0;pointer-events:none}
  .opcion .punto{
    flex:0 0 18px;height:18px;border-radius:50%;
    border:2px solid var(--humo);transition:all .15s;
  }
  .opcion.activa{border-color:var(--azul);background:rgba(45,90,143,.06)}
  .opcion.activa .punto{border-color:var(--azul);background:var(--azul);box-shadow:0 0 0 3px rgba(45,90,143,.18)}
  .acciones{display:flex;align-items:center;gap:18px;margin-top:30px;flex-wrap:wrap}
  .btn{
    font-family:'JetBrains Mono',monospace;font-weight:500;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
    background:var(--azul);
    color:#faf9f6;border:none;border-radius:2px;
    padding:16px 32px;cursor:pointer;
    transition:transform .15s, box-shadow .15s, background .15s;
  }
  .btn:hover{background:#25497a;box-shadow:0 6px 20px rgba(45,90,143,.28)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  .atras{
    background:none;border:none;color:var(--humo);font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.08em;
    cursor:pointer;padding:6px 2px;
  }
  .atras:hover{color:var(--azul)}
  .pista{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--humo);letter-spacing:.06em}
  .nota-privada{
    font-size:.85rem;color:var(--humo);margin-top:26px;display:flex;gap:8px;align-items:flex-start;
  }
  .nota-privada svg{flex:0 0 14px;margin-top:4px;color:var(--brasa)}
  .error{color:var(--brasa-honda);font-size:.88rem;margin-top:10px;display:none}
  .error.ver{display:block}
  footer{
    position:relative;z-index:2;
    padding:18px clamp(18px,5vw,48px);
    border-top:1px solid var(--linea);
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.06em;color:var(--humo);
    display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  /* pantalla final */
  .final .brasa-icono{
    width:44px;height:44px;margin-bottom:26px;color:var(--brasa);
    font-family:'Cormorant Garamond',serif;font-size:40px;line-height:1;
    animation:late 3.2s ease-in-out infinite;
  }
  .final .brasa-icono::before{content:"\25C6"}
  @keyframes late{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  @media (prefers-reduced-motion:reduce){.final .brasa-icono{animation:none}}
  .final .caminos{display:grid;gap:12px;margin-top:28px}
  .final .caminos a{
    color:var(--tinta);text-decoration:none;background:var(--noche-2);border:1px solid var(--linea);
    border-radius:var(--radius);padding:18px 20px;display:block;transition:border-color .15s;
    font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;line-height:1.2;
  }
  .final .caminos a:hover{border-color:var(--azul)}
  .final .caminos a span{display:block;font-family:'DM Sans',sans-serif;font-weight:400;color:var(--humo);font-size:.86rem;margin-top:5px}
  @media (max-width:560px){
    .btn{width:100%;text-align:center}
    .acciones{gap:14px}
    .acciones .atras{order:2}
  }

  /* mini-chat de follow-up */
  .chat{display:flex;flex-direction:column;gap:10px;margin:6px 0 22px}
  .burbuja{max-width:85%;padding:12px 16px;border-radius:16px;font-size:1rem;line-height:1.5}
  .burbuja.mia{align-self:flex-end;background:rgba(255,138,61,.14);border:1px solid rgba(255,138,61,.35);border-bottom-right-radius:4px}
  .burbuja.carlos{align-self:flex-start;background:var(--noche-2);border:1px solid var(--linea);border-bottom-left-radius:4px}
  .burbuja .quien{display:block;font-family:'Spline Sans Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--brasa);margin-bottom:5px}


  .oculto{display:none!important}


  .foto-carlos{width:min(260px,60%);border-radius:var(--radius);display:block;margin:0 0 24px;
    border:1px solid rgba(255,138,61,.35);box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .firma{width:190px;display:block;margin:22px 0 8px;opacity:1}
  .video-p0{width:100%;max-height:62vh;border-radius:var(--radius);border:1px solid var(--linea);margin-bottom:20px;background:#000}


  #btn-musica{position:fixed;bottom:18px;right:18px;z-index:20;width:44px;height:44px;border-radius:50%;
    background:var(--noche-2);border:1px solid var(--linea);color:var(--humo);cursor:pointer;
    display:none;align-items:center;justify-content:center;transition:border-color .15s}
  #btn-musica:hover{border-color:var(--brasa);color:var(--crema)}
  #btn-musica.activa{color:var(--brasa);border-color:rgba(255,138,61,.5)}

</style>
</head>
<body>

<div class="fuego" id="fuego"></div>
<div class="progreso"><b id="barra"></b></div>

<header>
  <div class="marca"><svg width="22" height="22" viewBox="0 0 100 100" aria-hidden="true"><g transform="translate(50,54)"><polygon points="0,-24 -12,-3 12,-3" fill="#2d5a8f"></polygon><polygon points="-14,0 -26,21 -2,21" fill="#2d5a8f"></polygon><polygon points="14,0 2,21 26,21" fill="#2d5a8f"></polygon></g></svg><strong>Método Holístico</strong>&nbsp;· NeuroSync</div>
  <div class="contador" id="contador"></div>
</header>

<main><div id="app"></div></main>

<button id="btn-musica" aria-label="Silenciar música" title="Música">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path class="ondas" d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>
</button>
<footer>
  <span>Tus respuestas son privadas. Se usan solo para construir tu sesión.</span>
  <span>© Método Holístico</span>
</footer>

<script>
/* ═══ CONFIG (Siddhartha): URL del Inbound Webhook de GHL ═══ */
const WEBHOOK_URL = "https://services.leadconnectorhq.com/hooks/3NadJt21CAuDA7Oqm9GC/webhook-trigger/61996e78-c097-449f-8141-812d91cd3538";
const VIDEO_P0 = "https://assets.cdn.filesafe.space/3NadJt21CAuDA7Oqm9GC/media/6a58f3d92f7322e09614dd18.mp4";
const MUSICA_URL = "https://assets.cdn.filesafe.space/3NadJt21CAuDA7Oqm9GC/media/6a58f5ed498fdf281ade9e09.mp3";

/* ═══ PREGUNTAS v3 — el seguimiento es ASÍNCRONO (24-48h, Hoja de Seguimiento vía motor) ═══ */
const PASOS = [
 { id:"intro", tipo:"intro" },
 { id:"dudas", tipo:"explicacion", eyebrow:"Antes de empezar",
   burbujas:["antes de empezar te explico que es esto, sin rollo.",
     "NeuroSync es hipnosis, si. pero olvidate de la tele: es como una meditacion guiada, solo que personalizada. hecha para ti. para eso son estas preguntas.",
     "te ayudo a relajarte profundo, y en ese estado tu mente acepta las afirmaciones que yo te doy. cuales? las que tu y yo acordemos aqui. nada mas.",
     "tu siempre tienes el control. solo trabajamos lo que tu autorices, te vas a acordar de todo, claro. y hasta te puedes quedar dormido, no pasa nada."],
   q:"te parece? tienes alguna duda de como funciona?",
   ops:["Me parece. Vamos","Tengo una duda"], opcionDuda:"Tengo una duda",
   duda:{ pregunta:"dime, que duda tienes? te la contesto personalmente en tu seguimiento.", ph:"escribela aqui porfavro" } },
 { id:"nicotina", tipo:"radio", eyebrow:"Para empezar", q:"¿Fumas o vapeas actualmente?",
   ops:["Fumo","Vapeo","Las dos","Ya no","Nunca lo he hecho"] },
 { id:"mananas", tipo:"texto", eyebrow:"Tu día", q:"¿A qué le dedicas tus mañanas hoy?",
   sub:"¿Tienes algún ritual, aunque sea chiquito? Cuéntamelo como es, no como debería ser.",
   ph:"Ej. me despierto, agarro el teléfono, café…" },
 { id:"lugar", tipo:"texto", eyebrow:"Tu lugar", q:"Cierra los ojos un segundo. ¿Cuál es tu lugar o paisaje de paz?",
   sub:"El primero que aparezca. Cómo se ve, cómo se oye, cómo huele.",
   ph:"Ej. la playa de niño, huele a sal, se oyen las olas…" },
 { id:"vida", tipo:"texto", eyebrow:"Tu presente", q:"¿Y cómo se siente tu vida últimamente?",
   sub:"En una frase, como le contestarías a un amigo de verdad.", ph:"Sin pulirlo…" },
 { id:"aprender", tipo:"radio", eyebrow:"Cómo funcionas", q:"Cuando quieres realmente aprender algo, ¿qué te funciona mejor?",
   ops:["Que me digan exactamente qué hacer, paso a paso","Que me acompañen mientras encuentro mi propia forma"] },
 { id:"entrega", tipo:"radio", eyebrow:"Cómo funcionas", q:"En un masaje, una clase de yoga o algo parecido…",
   ops:["Me entrego y dejo que me lleven","Una parte de mí se queda vigilando y analizando"] },
 { id:"previas", tipo:"radio", eyebrow:"Cómo funcionas", q:"¿Has hecho meditaciones guiadas o algo de ese tipo?",
   ops:["Sí, y me llevaron profundo","Sí, pero me incomodó que me dijeran qué hacer","Nunca. Esta sería la primera"] },
 { id:"deseo", tipo:"texto", eyebrow:"Lo que vienes a buscar", q:"¿Qué quieres que esta sesión trabaje en ti?",
   sub:"Puede ser algo que quieras cambiar, superar, soltar… o recuperar. Dímelo con tus palabras.", ph:"Quiero…" },
 { id:"freno", tipo:"texto", eyebrow:"El freno", q:"Y cuando estás cerca de lograr eso y algo te frena… ¿qué te dices a ti mismo en ese momento?",
   sub:"Escríbelo tal cual suena en tu cabeza, sin pulirlo.", ph:"Ej. “ya lo intentaste y no pudiste”…" },
 { id:"miedo", tipo:"texto", eyebrow:"Sin filtro", opcional:true,
   q:"¿Hay algo de todo esto que te dé miedo o desconfianza?",
   sub:"Del cambio mismo, o de este tipo de sesiones. Dilo sin filtro: es lo más útil que me puedes dar.",
   ph:"Si no hay nada, sigue de largo…" },
 { id:"orgullo", tipo:"texto", eyebrow:"Tu evidencia", q:"Cuéntame dos o tres momentos de tu vida de los que estés genuinamente orgulloso.",
   sub:"No importa de qué área. Qué pasó, dónde estabas… y cómo lo sentiste en el cuerpo: dónde, sé específico.",
   ph:"Momento 1… Momento 2…" },
 { id:"vetos", tipo:"texto", eyebrow:"Tus límites", opcional:true,
   q:"¿Hay algo de tu historia que prefieres que no toquemos?",
   sub:"Temas, personas, épocas. Se respeta a ciegas. Si no hay nada, sigue de largo.", ph:"Opcional…" },
 { id:"idioma", tipo:"radio", eyebrow:"Tu idioma", otro:true,
   q:"¿Cómo hablas tú de lo que te sostiene o te da paz?",
   sub:"Eso que te sostiene aunque no se pueda explicar del todo.",
   ops:["Dios","El universo, la energía","Yo y ya","Nada"] },
 { id:"salida", tipo:"radio", eyebrow:"El final", q:"Al terminar tu sesión, ¿cómo te quieres sentir?",
   ops:["Con paz profunda y una sonrisa","Encendido, pero sereno","En llamas, listo para comerme el mundo"] },
 { id:"tiempo", tipo:"radio", eyebrow:"Lo práctico", q:"¿Cuánto tiempo real tienes para escucharla sin interrupciones?",
   sub:"Sé honesto. Mejor 12 minutos enteros que 30 abandonados.",
   ops:["12 minutos","20 minutos","30 o más"] },
 { id:"final", tipo:"final" }
];

const R = { nombre:"", whatsapp:"", email:"" };
let paso = 0;
let modoDuda = false;

const app = document.getElementById("app");
const barra = document.getElementById("barra");
const contador = document.getElementById("contador");

function render(){
  const p = PASOS[paso];
  const totalQ = PASOS.length - 2;
  const pct = Math.max(0, Math.min(100, (paso/(PASOS.length-1))*100));
  barra.style.width = pct + "%";
  document.documentElement.style.setProperty("--calor", (0.10 + (pct/100)*0.24).toFixed(2));
  contador.textContent = (p.tipo!=="intro" && p.tipo!=="final") ? String(paso).padStart(2,"0")+(modoDuda?"b":"")+" / "+String(totalQ).padStart(2,"0") : "";
  if(p.tipo==="intro") app.innerHTML = vistaIntro();
  else if(p.tipo==="final"){ app.innerHTML = vistaFinal(); enviar(); }
  else if(p.tipo==="explicacion") app.innerHTML = modoDuda ? vistaDuda(p) : vistaExplicacion(p);
  else app.innerHTML = vistaPregunta(p);
  wire(p);
  window.scrollTo({top:0});
}

function vistaExplicacion(p){
  return `<div class="paso">
    <div class="eyebrow">${p.eyebrow}</div>
    ${VIDEO_P0
      ? `<video class="video-p0" src="${VIDEO_P0}" controls playsinline preload="metadata"></video>
         <p class="sub" style="margin-bottom:22px">NeuroSync es hipnosis: una meditacion guiada hecha para ti. tu siempre tienes el control.</p>`
      : `<div class="chat">${p.burbujas.map(b=>`<div class="burbuja carlos"><span class="quien">Carlos Alberto</span>${b}</div>`).join("")}</div>`}
    <h2 style="font-size:clamp(1.3rem,3.6vw,1.7rem)">${p.q}</h2>
    <div class="opciones" role="radiogroup">${p.ops.map(o=>`
      <label class="opcion"><input type="radio" name="op" value="${o}"><span class="punto"></span><span>${o}</span></label>`).join("")}
    </div>
    <div class="error" id="err">Elige una para seguir.</div>
    <div class="acciones"><button class="btn" id="siguiente">Siguiente</button></div>
  </div>`;
}

function vistaDuda(p){
  return `<div class="paso">
    <div class="eyebrow">${p.eyebrow}</div>
    <h2 style="font-size:clamp(1.3rem,3.6vw,1.7rem)">${p.duda.pregunta}</h2>
    <textarea id="campo" placeholder="${p.duda.ph}"></textarea>
    <div class="error" id="err">Escríbeme aunque sea una línea.</div>
    <div class="acciones">
      <button class="atras" id="atras">← Atrás</button>
      <button class="btn" id="siguiente">Siguiente</button>
    </div>
  </div>`;
}

function vistaPregunta(p){
  let cuerpo = "";
  if(p.tipo==="texto"){
    cuerpo = `<textarea id="campo" placeholder="${p.ph||""}">${(R[p.id]||"").replace(/</g,"&lt;")}</textarea>`;
  } else {
    cuerpo = `<div class="opciones" role="radiogroup" aria-label="${p.q}">` + p.ops.map(o=>`
      <label class="opcion ${R[p.id]===o?"activa":""}"><input type="radio" name="op" value="${o}" ${R[p.id]===o?"checked":""}><span class="punto"></span><span>${o}</span></label>`).join("") + `</div>`
      + (p.otro ? `<div class="campo" style="margin-top:14px"><input type="text" id="campo-otro" placeholder="Si quieres, cuéntame más…" value="${R[p.id+"_otro"]||""}"></div>` : "");
  }
  return `<div class="paso">
    <div class="eyebrow">${p.eyebrow||""}</div>
    <h2>${p.q}</h2>
    ${p.sub?`<p class="sub">${p.sub}</p>`:""}
    ${cuerpo}
    <div class="error" id="err">${p.tipo==="texto"?"Escríbeme aunque sea una línea.":"Elige una para seguir."}</div>
    <div class="acciones">
      <button class="atras" id="atras">← Atrás</button>
      <button class="btn" id="siguiente">Siguiente</button>
      ${p.opcional?'<span class="pista">opcional</span>':""}
    </div>
  </div>`;
}

function vistaIntro(){
  return `<div class="paso">
    <div class="eyebrow">Sesión a tu medida</div>
    <h1>Voy a hacerte unas preguntas.<br>Con eso construyo una sesión NeuroSync hecha para ti.</h1>
    <p class="sub">Respóndelas como si me las contaras a mí, sin pulirlas. Toma unos cinco minutos. Nadie más las lee.</p>
    <p class="sub" style="margin-top:-16px">Esto solo funciona si tú lo quieres. Nadie te lleva a ningún lado al que no quieras ir.</p>
    <div class="campo"><label for="f-nombre">Tu nombre</label><input type="text" id="f-nombre" autocomplete="given-name" placeholder="¿Cómo te llamas?"></div>
    <div class="campo"><label for="f-wa">Tu WhatsApp</label><input type="tel" id="f-wa" autocomplete="tel" placeholder="+52 …"></div>
    <div class="campo"><label for="f-mail">Tu correo</label><input type="email" id="f-mail" autocomplete="email" placeholder="Para mandarte tu sesión"></div>

async function enviar(confirmar){
  const estado=document.getElementById("estado-envio");
  const reintento=document.getElementById("reintento");
  if(!WEBHOOK_URL){ return; }
  const payload=JSON.stringify({ origen:"rapport-neurosync", version:"v3-async", fecha:new Date().toISOString(), respuestas:R });
  try{
    const r=await fetch(WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:payload});
    if(!r.ok) throw new Error("status");
    if(confirmar&&estado) estado.textContent="Listo. Tus respuestas ya llegaron. En 24 a 48 horas te respondo.";
  }catch(e1){
   try{
    await fetch(WEBHOOK_URL,{method:"POST",mode:"no-cors",body:payload});
    if(confirmar&&estado) estado.textContent="Listo. Tus respuestas ya llegaron. En 24 a 48 horas te respondo.";
   }catch(e2){
    if(estado) estado.textContent="No pude registrar tus respuestas por un problema de conexión. Revisa tu internet y vuelve a intentar.";
    if(reintento) reintento.style.display="flex";
   }
  }
}
